<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>サバオッチ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8d5c0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
.device { max-width: 320px; width: 100%; background: #f5e6d3; border-radius: 40px 40px 60px 60px; border: 3px solid #c8a882; padding: 20px 20px 28px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.08), 0 4px 20px rgba(0,0,0,0.15); position: relative; }
.device::before { content:''; position:absolute; top:12px; left:50%; transform:translateX(-50%); width:80px; height:6px; background:#c8a882; border-radius:3px; }
.app-title { text-align:center; margin-top:10px; font-size:16px; font-weight:700; color:#5a3a0a; letter-spacing:3px; }
.screen-wrapper { background:#1a1a2e; border-radius:20px; border:3px solid #888; padding:3px; margin-top:10px; box-shadow:inset 0 0 10px rgba(0,0,0,0.5); }
.screen { background:#9dc58f; border-radius:16px; height:220px; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; }
.pixel-bg { position:absolute; inset:0; background-image:linear-gradient(rgba(0,0,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.03) 1px,transparent 1px); background-size:8px 8px; }
.status-bar { position:absolute; top:8px; left:10px; right:10px; display:flex; justify-content:space-between; align-items:center; z-index:10; }
.age-label { font-size:10px; font-weight:600; color:#2d5a27; background:rgba(255,255,255,0.5); padding:1px 6px; border-radius:8px; }
.heart-display { font-size:11px; color:#c0392b; letter-spacing:1px; }
.stat-bars { position:absolute; bottom:8px; left:10px; right:10px; z-index:10; display:flex; gap:5px; flex-direction:column; }
.stat-row { display:flex; align-items:center; gap:4px; }
.stat-icon { font-size:9px; width:12px; }
.stat-bar-bg { flex:1; height:5px; background:rgba(0,0,0,0.15); border-radius:3px; overflow:hidden; }
.stat-bar-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
.bar-food { background:#e67e22; }
.bar-happy { background:#e91e8c; }
.bar-energy { background:#2196F3; }
.pet-container { position:absolute; top:28px; left:0; right:0; bottom:52px; display:flex; align-items:center; justify-content:center; z-index:5; flex-direction:column; }
.speech-bubble { background:rgba(255,255,255,0.85); border-radius:10px; padding:3px 10px; font-size:11px; color:#2d5a27; font-weight:500; margin-bottom:4px; white-space:nowrap; min-height:20px; display:flex; align-items:center; }
#pet-canvas { image-rendering:pixelated; width:112px; height:112px; }
.buttons-row { display:flex; justify-content:center; gap:12px; margin-top:18px; }
.btn-group { display:flex; flex-direction:column; align-items:center; gap:4px; }
.action-btn { width:48px; height:48px; border-radius:50%; border:2px solid #a07850; background:#d4956a; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 0 #8b6040,0 4px 6px rgba(0,0,0,0.2); transition:transform 0.1s,box-shadow 0.1s; user-select:none; }
.action-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #8b6040,0 2px 4px rgba(0,0,0,0.2); }
.action-btn svg { width:24px; height:24px; }
.btn-label { font-size:10px; color:#7a5a3a; font-weight:600; }
.alert-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; border-radius:16px; z-index:20; flex-direction:column; gap:8px; }
.alert-text { color:#fff; font-size:14px; font-weight:600; text-align:center; }
.revive-btn { background:#ff6b6b; border:none; border-radius:8px; padding:6px 16px; color:#fff; font-size:12px; cursor:pointer; font-weight:600; }
</style>
</head>
<body>
<div class="device">
  <div class="app-title">サバオッチ</div>
  <div class="screen-wrapper">
    <div class="screen" id="screen">
      <div class="pixel-bg"></div>
      <div class="status-bar">
        <span class="age-label" id="age-label">🥚 たまご</span>
        <span class="heart-display" id="hearts">♥♥♥</span>
      </div>
      <div class="pet-container">
        <div class="speech-bubble" id="speech">うまれそう...</div>
        <canvas id="pet-canvas" width="56" height="56"></canvas>
      </div>
      <div class="stat-bars">
        <div class="stat-row"><span class="stat-icon">🐟</span><div class="stat-bar-bg"><div class="stat-bar-fill bar-food" id="bar-food" style="width:80%"></div></div></div>
        <div class="stat-row"><span class="stat-icon">😤</span><div class="stat-bar-bg"><div class="stat-bar-fill bar-happy" id="bar-happy" style="width:80%"></div></div></div>
        <div class="stat-row"><span class="stat-icon">⚡</span><div class="stat-bar-bg"><div class="stat-bar-fill bar-energy" id="bar-energy" style="width:80%"></div></div></div>
      </div>
      <div class="alert-overlay" id="dead-overlay" style="display:none;">
        <div style="font-size:32px">💀</div>
        <div class="alert-text">鯖男は逝った。<br><span style="font-size:11px;font-weight:400">最後まで凶暴だった</span></div>
        <button class="revive-btn" onclick="revive()">たまごから再スタート</button>
      </div>
    </div>
  </div>
  <div class="buttons-row">
    <div class="btn-group">
      <button class="action-btn" onclick="feed()">
        <svg viewBox="0 0 24 24" fill="none">
          <ellipse cx="12" cy="13" rx="8" ry="4" fill="#f48fb1" stroke="#c2185b" stroke-width="1.2"/>
          <ellipse cx="12" cy="11" rx="8" ry="4" fill="#f8bbd0" stroke="#c2185b" stroke-width="1.2"/>
          <ellipse cx="12" cy="9" rx="8" ry="4" fill="#fce4ec" stroke="#c2185b" stroke-width="1.2"/>
          <rect x="9" y="15" width="6" height="1.5" rx="0.5" fill="#a1887f" stroke="#795548" stroke-width="0.5"/>
          <rect x="10.5" y="16.5" width="3" height="4" rx="0.5" fill="#bcaaa4" stroke="#795548" stroke-width="0.5"/>
        </svg>
      </button>
      <span class="btn-label">刺身</span>
    </div>
    <div class="btn-group">
      <button class="action-btn" onclick="play()">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="14" width="18" height="5" rx="1.5" fill="#8d6e63" stroke="#5d4037" stroke-width="1"/>
          <line x1="6" y1="14" x2="6" y2="19" stroke="#5d4037" stroke-width="0.7"/>
          <line x1="9" y1="14" x2="9" y2="19" stroke="#5d4037" stroke-width="0.7"/>
          <line x1="12" y1="14" x2="12" y2="19" stroke="#5d4037" stroke-width="0.7"/>
          <line x1="15" y1="14" x2="15" y2="19" stroke="#5d4037" stroke-width="0.7"/>
          <line x1="18" y1="14" x2="18" y2="19" stroke="#5d4037" stroke-width="0.7"/>
          <path d="M8 14 Q9 10 11 9" stroke="#5d4037" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          <path d="M10 13 Q11 9 13 8" stroke="#5d4037" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          <path d="M12 14 Q13 10 15 9" stroke="#5d4037" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          <ellipse cx="11" cy="8.5" rx="2" ry="1.2" fill="#ffcc80" stroke="#e65100" stroke-width="0.8"/>
          <path d="M10 7.5 Q11 5 12 7.5" fill="#ffcc80" stroke="#e65100" stroke-width="0.7"/>
        </svg>
      </button>
      <span class="btn-label">爪とぎ</span>
    </div>
    <div class="btn-group">
      <button class="action-btn" onclick="cleanPoop()">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="10.5" y="3" width="3" height="13" rx="1.5" fill="#90a4ae" stroke="#546e7a" stroke-width="1"/>
          <path d="M7 16 Q12 14 17 16 L16 20 Q12 21.5 8 20 Z" fill="#78909c" stroke="#546e7a" stroke-width="1"/>
          <line x1="8.5" y1="16.5" x2="8" y2="20" stroke="#546e7a" stroke-width="0.7"/>
          <line x1="10.5" y1="15.8" x2="10.2" y2="20.2" stroke="#546e7a" stroke-width="0.7"/>
          <line x1="12.5" y1="15.5" x2="12.5" y2="21" stroke="#546e7a" stroke-width="0.7"/>
          <line x1="14.5" y1="15.8" x2="14.8" y2="20.2" stroke="#546e7a" stroke-width="0.7"/>
        </svg>
      </button>
      <span class="btn-label">そうじ</span>
    </div>
    <div class="btn-group">
      <button class="action-btn" onclick="sleep()">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 4 A9 9 0 0 0 12 22 A9 9 0 0 1 12 4Z" fill="#90caf9" stroke="#1565c0" stroke-width="1"/>
          <circle cx="14" cy="13" r="7" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
          <text x="11" y="16" font-size="8" font-weight="700" fill="#1565c0" font-family="sans-serif">z</text>
          <text x="14.5" y="12" font-size="6" font-weight="700" fill="#1565c0" font-family="sans-serif">z</text>
        </svg>
      </button>
      <span class="btn-label">ねる</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('pet-canvas');
const ctx = canvas.getContext('2d');
const W=56, H=56;
const state = {
  food:80, happy:80, energy:80, age:0, stage:0, alive:true,
  tick:0, blinkTimer:0, sleeping:false,
  hasPoop:false, poopTimer:0, pooping:false, poopAnim:0,
  lounging:false, loungeTimer:0
};
const stages = ['🥚 たまご','😾 こねこ','😾 こども','😾 鯖男'];
const speeches = {
  idle:['あ？','…うぜ','なんだよ','触んな','ふん','寝かせろ'],
  hungry:['飯はまだか','おせーんだよ','腹減った、殺すぞ','刺身よこせ'],
  sad:['退屈だ','遊べよ雑魚','暇だ','…つまんね'],
  tired:['眠い、どけ','zzz','うるさい'],
  eating:['…','ふん、まあな','もっとよこせ','当然だ'],
  playing:['シャッ！','ふん！','もっと本気出せ','弱い'],
  sleeping:['…zz','触ったら引っかく','zzZ'],
  lounge:['…','ごろ','どうせ暇だし','ふん'],
  poop:['どけ','…少し待て','来んな'],
  pooped:['片付けろ','臭い、早くしろ','さっさとやれ'],
  angry:['あ゛？','殺すぞ','うるさい','触るな'],
  attack:['シャー！！','ガブッ','ひっかくぞ','やんのか']
};
const C = { base:'#c8922a', stripe:'#7a4e10', belly:'#f5e0b0', nose:'#e8a0a0', eye:'#e6c800', eyeA:'#ffdd00', pupil:'#1a0000', inner:'#f0c0a0', out:'#5a3a0a' };
function rnd(a){ return a[Math.floor(Math.random()*a.length)]; }
function updateSpeech(k){ document.getElementById('speech').textContent = rnd(speeches[k]||speeches.idle); }

function drawEgg(t){
  ctx.clearRect(0,0,W,H);
  const w=Math.sin(t*0.08)*1.5;
  ctx.save(); ctx.translate(28+w,26); ctx.scale(1,1.15);
  ctx.beginPath(); ctx.ellipse(0,2,11,13,0,0,Math.PI*2);
  ctx.fillStyle='#fffde7'; ctx.strokeStyle='#f9a825'; ctx.lineWidth=1.5; ctx.fill(); ctx.stroke();
  if(state.age>2){
    ctx.strokeStyle='#e57373'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-4,-2); ctx.lineTo(0,3); ctx.lineTo(4,-2); ctx.stroke();
  }
  ctx.restore();
}

function drawCatUpright(t, sc, ang){
  const b=Math.sin(t*0.12)*1.5;
  const blink=state.blinkTimer<3;
  ctx.save(); ctx.translate(28, 24+b); ctx.scale(sc,sc);
  ctx.beginPath(); ctx.moveTo(10,14); ctx.bezierCurveTo(22,18,24,5,18,0);
  ctx.strokeStyle=C.out; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,14); ctx.bezierCurveTo(22,18,24,5,18,0);
  ctx.strokeStyle=C.base; ctx.lineWidth=2.5; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0,12,11,9,0,0,Math.PI*2);
  ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
  ctx.save(); ctx.beginPath(); ctx.ellipse(0,12,11,9,0,0,Math.PI*2); ctx.clip();
  ctx.strokeStyle=C.stripe; ctx.lineWidth=1.2;
  for(let x=-14;x<14;x+=4){ ctx.beginPath(); ctx.moveTo(x,3); ctx.lineTo(x-2,21); ctx.stroke(); }
  ctx.restore();
  ctx.beginPath(); ctx.ellipse(0,14,6,6,0,0,Math.PI*2); ctx.fillStyle=C.belly; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-7,20,3,4,-0.2,0,Math.PI*2); ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(7,20,3,4,0.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0,-2,12,11,0,0,Math.PI*2);
  ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
  ctx.save(); ctx.beginPath(); ctx.ellipse(0,-2,12,11,0,0,Math.PI*2); ctx.clip();
  ctx.strokeStyle=C.stripe; ctx.lineWidth=1;
  [-3,0,3].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,-13); ctx.lineTo(x+0.5,-1); ctx.stroke(); });
  ctx.restore();
  if(ang){
    ctx.beginPath(); ctx.moveTo(-12,-16); ctx.lineTo(-4,-10); ctx.closePath(); ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-11,-15); ctx.lineTo(-5,-10); ctx.closePath(); ctx.fillStyle=C.inner; ctx.fill();
    ctx.beginPath(); ctx.moveTo(12,-16); ctx.lineTo(4,-10); ctx.closePath(); ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(11,-15); ctx.lineTo(5,-10); ctx.closePath(); ctx.fillStyle=C.inner; ctx.fill();
  } else {
    ctx.beginPath(); ctx.moveTo(-10,-8); ctx.lineTo(-14,-18); ctx.lineTo(-4,-12); ctx.closePath(); ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-10,-9); ctx.lineTo(-13,-16); ctx.lineTo(-5,-12); ctx.closePath(); ctx.fillStyle=C.inner; ctx.fill();
    ctx.beginPath(); ctx.moveTo(10,-8); ctx.lineTo(14,-18); ctx.lineTo(4,-12); ctx.closePath(); ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,-9); ctx.lineTo(13,-16); ctx.lineTo(5,-12); ctx.closePath(); ctx.fillStyle=C.inner; ctx.fill();
  }
  const ec = ang ? C.eyeA : C.eye;
  if(blink){
    if(ang){
      ctx.save(); ctx.translate(-4.5,-3); ctx.rotate(-0.3);
      ctx.beginPath(); ctx.ellipse(0,0,2.8,2.0,0,0,Math.PI*2); ctx.fillStyle=ec; ctx.fill();
      ctx.beginPath(); ctx.ellipse(0,0,0.9,1.8,0,0,Math.PI*2); ctx.fillStyle=C.pupil; ctx.fill();
      ctx.restore();
      ctx.save(); ctx.translate(4.5,-3); ctx.rotate(0.3);
      ctx.beginPath(); ctx.ellipse(0,0,2.8,2.0,0,0,Math.PI*2); ctx.fillStyle=ec; ctx.fill();
      ctx.beginPath(); ctx.ellipse(0,0,0.9,1.8,0,0,Math.PI*2); ctx.fillStyle=C.pupil; ctx.fill();
      ctx.restore();
      ctx.strokeStyle='#7a4e10'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(-8,-6); ctx.lineTo(-1,-4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8,-6); ctx.lineTo(1,-4); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.ellipse(-4.5,-3,2.8,2.5,0,0,Math.PI*2); ctx.fillStyle=ec; ctx.fill();
      ctx.beginPath(); ctx.ellipse(-4.5,-3,1.2,2.2,0,0,Math.PI*2); ctx.fillStyle=C.pupil; ctx.fill();
      ctx.beginPath(); ctx.arc(-3.8,-4,0.6,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(4.5,-3,2.8,2.5,0,0,Math.PI*2); ctx.fillStyle=ec; ctx.fill();
      ctx.beginPath(); ctx.ellipse(4.5,-3,1.2,2.2,0,0,Math.PI*2); ctx.fillStyle=C.pupil; ctx.fill();
      ctx.beginPath(); ctx.arc(5.2,-4,0.6,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    }
  } else {
    ctx.strokeStyle=C.pupil; ctx.lineWidth=1.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-7,-3); ctx.lineTo(-2,-3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2,-3); ctx.lineTo(7,-3); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-1.5,2); ctx.lineTo(1.5,2); ctx.closePath(); ctx.fillStyle=C.nose; ctx.fill();
  if(ang){
    ctx.strokeStyle='#7a2200'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-4,4); ctx.lineTo(4,4); ctx.stroke();
  } else {
    ctx.strokeStyle=C.out; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(0,2); ctx.quadraticCurveTo(-2,5,-4,4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,2); ctx.quadraticCurveTo(2,5,4,4); ctx.stroke();
  }
  ctx.strokeStyle='#ccc'; ctx.lineWidth=0.7;
  ctx.beginPath(); ctx.moveTo(-2,2); ctx.lineTo(-12,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-2,3); ctx.lineTo(-12,4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,2); ctx.lineTo(12,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,3); ctx.lineTo(12,4); ctx.stroke();
  ctx.restore();
}

function drawCatLounge(t, sc){
  const breathe = Math.sin(t*0.08)*1;
  ctx.save(); ctx.translate(28, 34+breathe); ctx.scale(sc, sc);
  ctx.beginPath(); ctx.moveTo(14,0); ctx.bezierCurveTo(22,-2,24,-8,20,-10);
  ctx.strokeStyle=C.out; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14,0); ctx.bezierCurveTo(22,-2,24,-8,20,-10);
  ctx.strokeStyle=C.base; ctx.lineWidth=2.5; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0,0,14,8,0,0,Math.PI*2);
  ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
  ctx.save(); ctx.beginPath(); ctx.ellipse(0,0,14,8,0,0,Math.PI*2); ctx.clip();
  ctx.strokeStyle=C.stripe; ctx.lineWidth=1.2;
  for(let y=-10;y<10;y+=4){ ctx.beginPath(); ctx.moveTo(-16,y); ctx.lineTo(16,y+2); ctx.stroke(); }
  ctx.restore();
  ctx.beginPath(); ctx.ellipse(0,2,8,4,0,0,Math.PI*2); ctx.fillStyle=C.belly; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-12,-2,5,3,0.2,0,Math.PI*2); ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-10,4,5,3,-0.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-14,-1,9,8,0.3,0,Math.PI*2);
  ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
  ctx.save(); ctx.beginPath(); ctx.ellipse(-14,-1,9,8,0.3,0,Math.PI*2); ctx.clip();
  ctx.strokeStyle=C.stripe; ctx.lineWidth=1;
  [-17,-14,-11].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,-9); ctx.lineTo(x+1,7); ctx.stroke(); });
  ctx.restore();
  ctx.beginPath(); ctx.moveTo(-19,-7); ctx.lineTo(-23,-14); ctx.lineTo(-14,-9); ctx.closePath();
  ctx.fillStyle=C.base; ctx.strokeStyle=C.out; ctx.lineWidth=1; ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-19,-8); ctx.lineTo(-22,-13); ctx.lineTo(-15,-9); ctx.closePath();
  ctx.fillStyle=C.inner; ctx.fill();
  ctx.strokeStyle=C.pupil; ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-18,-2); ctx.lineTo(-14,-2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-13,-2); ctx.lineTo(-10,-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-14,1); ctx.lineTo(-15.5,3); ctx.lineTo(-12.5,3); ctx.closePath(); ctx.fillStyle=C.nose; ctx.fill();
  ctx.strokeStyle='#ccc'; ctx.lineWidth=0.7;
  ctx.beginPath(); ctx.moveTo(-15,2); ctx.lineTo(-22,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-15,3); ctx.lineTo(-22,4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-13,2); ctx.lineTo(-7,0); ctx.stroke();
  ctx.restore();
}

function drawPoop(px, py, sz){
  ctx.save(); ctx.translate(px,py); ctx.scale(sz,sz);
  [{rx:7,ry:4,y:0},{rx:5.5,ry:3.5,y:-6},{rx:4,ry:3,y:-11},{rx:2.5,ry:2.5,y:-15}].forEach(l=>{
    ctx.beginPath(); ctx.ellipse(0,l.y,l.rx,l.ry,0,0,Math.PI*2);
    ctx.fillStyle='#7B4F2E'; ctx.strokeStyle='#4a2e10'; ctx.lineWidth=0.8; ctx.fill(); ctx.stroke();
  });
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-2,-11,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2,-11,1.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(-1.8,-11,0.6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2.2,-11,0.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function isAngry(){ return state.food<35||state.happy<35||state.hasPoop; }

function draw(){
  const t=state.tick;
  ctx.clearRect(0,0,W,H);
  if(!state.alive){
    ctx.save(); ctx.translate(28,28); ctx.globalAlpha=0.5+Math.sin(t*0.1)*0.1;
    ctx.beginPath(); ctx.ellipse(0,0,12,10,0,0,Math.PI*2); ctx.fillStyle='#b0bec5'; ctx.strokeStyle='#607d8b'; ctx.lineWidth=1.5; ctx.fill(); ctx.stroke();
    ctx.globalAlpha=0.8; ctx.fillStyle='#333'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('× ×',0,-2);
    ctx.beginPath(); ctx.moveTo(-4,4); ctx.lineTo(4,4); ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore(); return;
  }
  const sc=state.stage===0?0.6:state.stage===1?0.8:1.0;
  if(state.stage===0){ drawEgg(t); return; }
  const ang=isAngry();
  if(state.sleeping){
    drawCatUpright(t,sc,false);
    ctx.font='bold 9px sans-serif'; ctx.fillStyle='#1565C0';
    const zx=44+Math.sin(t*0.1);
    ctx.fillText('z',zx,8); ctx.font='bold 7px sans-serif'; ctx.fillText('z',zx-2,15);
    if(state.hasPoop) drawPoop(44,48,0.75);
    return;
  }
  if(state.pooping){
    ctx.save(); ctx.translate(0,2); drawCatUpright(t,sc,true); ctx.restore();
    const p=Math.min(state.poopAnim/30,1);
    if(p>0) drawPoop(44,48-((1-p)*8),0.75*p);
    return;
  }
  if(state.lounging){
    drawCatLounge(t,sc);
    if(state.hasPoop) drawPoop(44,48,0.75);
    return;
  }
  drawCatUpright(t,sc,ang);
  if(state.hasPoop) drawPoop(44,48,0.75);
}

function updateBars(){ document.getElementById('bar-food').style.width=state.food+'%'; document.getElementById('bar-happy').style.width=state.happy+'%'; document.getElementById('bar-energy').style.width=state.energy+'%'; }
function updateHearts(){ const avg=(state.food+state.happy+state.energy)/3; document.getElementById('hearts').textContent=avg>66?'♥♥♥':avg>33?'♥♥♡':'♥♡♡'; }
function updateAgeLabel(){ document.getElementById('age-label').textContent=stages[state.stage]; }

function checkIdle(){
  if(state.hasPoop){ updateSpeech('pooped'); return; }
  if(state.food<35) updateSpeech('hungry');
  else if(state.happy<35) updateSpeech('angry');
  else if(state.energy<30) updateSpeech('tired');
  else if(Math.random()<0.4) updateSpeech('idle');
}

function triggerPoop(){
  if(state.hasPoop||state.pooping||state.sleeping||state.stage===0) return;
  state.lounging=false;
  state.pooping=true; state.poopAnim=0; updateSpeech('poop');
  const iv=setInterval(()=>{
    state.poopAnim++;
    if(state.poopAnim>=40){
      clearInterval(iv);
      state.pooping=false;
      state.hasPoop=true;
      state.happy=Math.max(0,state.happy-15);
      updateSpeech('pooped'); updateBars(); updateHearts();
    }
  },60);
}

function gameTick(){
  if(!state.alive||state.sleeping) return;
  state.tick++; state.blinkTimer=(state.blinkTimer+1)%60;
  if(state.lounging){
    state.loungeTimer--;
    if(state.loungeTimer<=0||isAngry()||state.pooping) state.lounging=false;
  }
  if(state.tick%120===0){
    state.food=Math.max(0,state.food-5); state.happy=Math.max(0,state.happy-4); state.energy=Math.max(0,state.energy-2);
    state.age++; state.poopTimer++;
    checkIdle();
    if(!state.lounging&&!state.pooping&&!state.hasPoop&&state.stage>0&&!isAngry()&&Math.random()<0.15){
      state.lounging=true; state.loungeTimer=5; updateSpeech('lounge');
    }
    if(state.age===3&&state.stage===0){ state.stage=1; updateAgeLabel(); updateSpeech('attack'); }
    if(state.age===8&&state.stage===1){ state.stage=2; updateAgeLabel(); updateSpeech('attack'); }
    if(state.age===18&&state.stage===2){ state.stage=3; updateAgeLabel(); updateSpeech('attack'); }
    if(state.poopTimer>=7&&!state.hasPoop&&!state.pooping&&state.stage>0){ state.poopTimer=0; triggerPoop(); }
    if(state.food<=0&&state.happy<=0){ state.alive=false; document.getElementById('dead-overlay').style.display='flex'; }
  }
  updateBars(); updateHearts(); draw();
}

function feed(){ if(!state.alive||state.sleeping) return; state.lounging=false; state.food=Math.min(100,state.food+25); state.energy=Math.min(100,state.energy+5); state.poopTimer+=2; updateSpeech(Math.random()<0.5?'eating':'idle'); updateBars(); updateHearts(); }
function play(){ if(!state.alive||state.sleeping) return; state.lounging=false; if(state.energy<15){ updateSpeech('angry'); return; } state.happy=Math.min(100,state.happy+25); state.energy=Math.max(0,state.energy-15); state.food=Math.max(0,state.food-5); updateSpeech(Math.random()<0.5?'playing':'attack'); updateBars(); updateHearts(); }
function cleanPoop(){
  if(!state.hasPoop){ updateSpeech('idle'); return; }
  state.hasPoop=false; state.pooping=false; state.poopAnim=0;
  state.happy=Math.min(100,state.happy+10);
  updateSpeech(Math.random()<0.5?'idle':'angry'); updateBars(); updateHearts();
}
function sleep(){ if(!state.alive) return; state.lounging=false; state.sleeping=!state.sleeping; if(state.sleeping){ updateSpeech('sleeping'); const si=setInterval(()=>{ if(!state.sleeping){ clearInterval(si); return; } state.energy=Math.min(100,state.energy+5); updateBars(); },500); } else { updateSpeech('angry'); } }
function revive(){ state.food=80; state.happy=80; state.energy=80; state.age=0; state.stage=0; state.alive=true; state.sleeping=false; state.tick=0; state.hasPoop=false; state.poopTimer=0; state.pooping=false; state.lounging=false; state.loungeTimer=0; document.getElementById('dead-overlay').style.display='none'; updateAgeLabel(); updateSpeech('idle'); updateBars(); updateHearts(); }

setInterval(gameTick,50);
draw();
</script>
</body>
</html>
